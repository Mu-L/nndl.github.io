<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">主页</a>
        <a href="{{ '/pdf/' | relative_url }}">PDF资源</a>
        <a href="{{ '/practice/' | relative_url }}">练习</a>
        <a href="{{ '/extras/' | relative_url }}">其他资源</a>
        <a href="{{ '/errata.html' | relative_url }}">勘误</a>
      </nav>
    </div>
  </header>
  <main class="site-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>
  <footer class="site-footer">
    <div class="wrapper">
      <p>© <a href="https://xpqiu.github.io/">邱锡鹏</a> · <a href="https://github.com/nndl/nndl.github.io">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
